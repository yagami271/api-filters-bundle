services:
  php:
    build: .
    container_name: api-filters-bundle-php
    volumes:
      - .:/app:rw,cached
    working_dir: /app
    tty: true
    stdin_open: true
    command: ["sleep", "infinity"]
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: api-filters-bundle-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: api_filters_test
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: api-filters-bundle-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: api_filters_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d api_filters_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  mariadb:
    image: mariadb:11
    container_name: api-filters-bundle-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: api_filters_test
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
